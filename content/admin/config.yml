publish_mode: editorial_workflow

backend:
  name: github
  repo: Tsaousis-Lab/blastodb
  branch: main # CMS always writes to main
  squash_merges: true

media_folder: assets/uploads
public_folder: /assets/uploads
pages_folder: content

collections:
  # ─── Data Types ──────────────────────────────────────────────────────────────
  - name: taxonomies
    label: Taxonomies
    files:
      - name: data_types
        label: Data Types
        file: content/taxonomies/data-types.md
        fields:
          - name: items
            label: Items
            widget: list
            hint: "One item per line.<br><p style='color:red'>***DANGER!***</p> Never delete any existing data-types, otherwise you will break relationships within the dataset!"
      - name: hosts
        label: Hosts
        file: content/taxonomies/mosts.md
        fields:
          - name: items
            label: Items
            widget: list
            hint: "One item per line.<br><p style='color:red'>***DANGER!***</p> Never delete any existing data-types, otherwise you will break relationships within the dataset!"

  # ─── Subtypes ──────────────────────────────────────────────────────────────
  - name: subtypes
    label: Subtypes
    folder: subtypes
    fields:
      - { name: name, label: Name, widget: string } #TODO: this should never be changed!

      - name: short_description
        label: Short-Description
        widget: markdown
        required: false
        hint: "Short description (1-3 sentences), which will be displayed in the selection card."

      - name: description
        label: Description
        widget: markdown
        required: false
        hint: "Long-form description, which is displayed when opening the respective page of the subtype.<br>Supports the extended markdown syntax."

  # ─── Datasets ──────────────────────────────────────────────────────────────
  - name: datasets
    label: Datasets
    label_singular: Dataset
    folder: content/datasets
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Title, widget: string }

      - name: data_types
        label: Data Type(s)
        widget: relation
        collection: taxonomies
        file: data_types
        search_fields: [items]
        value_field: "items.*"
        display_fields: ["items.*"]
        multiple: true
        required: false

      - name: sub_types
        label: Sub Type(s)
        widget: relation
        collection: taxonomies
        file: sub_types
        search_fields: [items]
        value_field: "items.*"
        display_fields: ["items.*"]
        multiple: true
        required: false

      - name: strains
        label: Strain(s)
        widget: list
        hint: "e.g. ATCC 50338"

      - name: source_url
        label: Link to Data Source
        widget: string
        hint: "Zenodo, NCBI, etc."

      - name: script_url
        label: Link to Evaluation Script
        widget: string
        required: false
        hint: "Optional — GitHub link, etc."

      - name: publication_ref
        label: Publication Reference ID
        widget: string
        hint: "Must match the ID of an entry in the Bibliography collection"

      - name: related_entries
        label: Related Entries
        widget: list
        required: false
        hint: "IDs of related datasets or protocols"

      - name: country
        label: Country / Geographical Origin
        widget: string
        required: false

      - name: body
        label: Description
        widget: markdown
        required: false
        hint: "Optional long-form description or protocol. Supports your custom BlastoDB markdown syntax."

  # ─── News ──────────────────────────────────────────────────────────────
  - name: news
    label: News
    label_singular: News Item
    folder: content/news
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - {
          name: layout,
          label: Layout,
          widget: hidden,
          default: layouts/news.njk,
        }
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text, required: false }
      - {
          name: short-description,
          label: Short Description,
          widget: text,
          required: false,
        }
      - { name: tags, label: Tags, widget: list, required: false }
      - name: date
        label: Date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
      - { name: body, label: Body, widget: markdown }

  # ─── Lab Protocols ─────────────────────────────────────────────────────
  - name: lab-protocols
    label: Lab Protocols
    label_singular: Protocol
    folder: content/lab-protocols
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - {
          name: layout,
          label: Layout,
          widget: hidden,
          default: layouts/lab-protocol.njk,
        }
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text, required: false }
      - {
          name: short-description,
          label: Short Description,
          widget: text,
          required: false,
        }
      - { name: tags, label: Tags, widget: list, required: false }
      - name: date
        label: Date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
      - { name: body, label: Body, widget: markdown }

  # ─── Research Labs ─────────────────────────────────────────────────────
  - name: research-labs
    label: Research Labs
    label_singular: Research Lab
    folder: content/research-labs
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - {
          name: layout,
          label: Layout,
          widget: hidden,
          default: layouts/base.njk,
        }
      - { name: title, label: Lab Name, widget: string }
      - {
          name: description,
          label: Short Description,
          widget: text,
          required: false,
        }
      - name: contacts
        label: Contact Persons
        widget: list
        fields:
          - { name: name, label: Name, widget: string }
          - { name: email, label: Email, widget: string }
          - { name: image, label: Image, widget: image, required: false }
      - { name: address, label: University / Address, widget: string }
      - { name: country, label: Country, widget: string }
      - { name: image, label: Image, widget: string, required: false }
      - { name: body, label: Body, widget: markdown, required: false }

  # ─── Bibliography ───────────────────────────────────────────────────────────
  - name: bibliography
    label: Bibliography
    label_singular: Publication
    folder: content/bibliography
    create: true
    slug: "{{fields.ref_id}}"
    extension: md
    format: frontmatter
    fields:
      - name: ref_id
        label: Reference ID / Citation Key
        widget: string
        hint: "Short unique ID, e.g. smith2023"

      - { name: title, label: Paper Title, widget: string }

      - name: authors
        label: Authors
        widget: list
        hint: "One author per line"

      - name: date
        label: Publication Date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false

      - name: journal
        label: Journal / Conference Name
        widget: string

      - name: doi
        label: DOI
        widget: string
        required: false

      - name: url
        label: Link to Publication
        widget: string
        required: false

  # ─── Pages ───────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: content
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }

      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
        }

      - { label: "Body", name: "body", widget: "markdown" }

  # ─── Navigation Bar ───────────────────────────────────────────────────────────
  - name: "nav"
    label: "Navigation"
    files:
      - label: "Navigation Configuration"
        name: "nav"
        file: "nav.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Site Logo", name: "site_logo", widget: "string" }
          - label: "Navigation Items"
            name: "nav"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - {
                  label: "File",
                  name: "file",
                  widget: "string",
                  required: false,
                }
              - label: "Items"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "File", name: "file", widget: "string" }
