publish_mode: simple
logo_url: "/images/blastie.webp"
app_title: "BlastoDB - CMS"

backend:
  name: github
  repo: Tsaousis-Lab/blastodb
  branch: main # CMS always writes to main
  squash_merges: true
  auth_methods: [token]

media_folder: assets/uploads
public_folder: /assets/uploads
pages_folder: content

collections:
  # -----------------------------------------------------------------------
  # DATASETS
  # -----------------------------------------------------------------------
  - name: datasets
    icon: database
    label: Datasets
    folder: content/data/datasets
    create: true
    slug: "{{slug}}"
    preview_path: "data/datasets/{{slug}}/"
    fields:
      - name: layout
        label: Layout
        widget: hidden
        default: layouts/dataset-page.njk

      - label: Key
        name: key
        widget: hidden
        default: "{{uuid}}"

      - label: Title
        name: title
        widget: string
        hint: "The name of the Dataset."

      - label: Link to Source
        name: link_to_source
        widget: string
        hint: "URL to the raw data."

      - label: Related Publication(s)
        name: related_publications
        widget: relation
        collection: publications
        file: publications
        value_field: "publications.*.key"
        search_fields:
          [
            "publications.*.key",
            "publications.*.title",
            "publications.*.date",
            "publications.*.publication_name",
            "publications.*.authors",
          ]
        display_fields:
          [
            "publications.*.title",
            "publications.*.date",
            "publications.*.publication_name",
            "publications.*.authors",
          ]
        multiple: true
        hint: "Publications must be added before you can link to them here."

      - label: Publication Date
        name: publication_date
        widget: string
        hint: "The date the dataset was published.<br>Enter a year (2024), month and year (06.2024), or full date (11.06.2024)"
        pattern:
          [
            '^(((0[1-9]|[12]\d|3[01])\.)?(0[1-9]|1[0-2])\.)?\d{4}$',
            "Use dd.mm.yyyy, mm.yyyy, or yyyy",
          ]

      - label: Datatype(s)
        name: datatypes
        widget: relation
        collection: vocabularies
        file: datatypes
        multiple: true
        min: 1
        value_field: datatypes.*
        display_fields: [datatypes.*]
        search_fields: [datatypes.*]
        hint: "At least one required.<br>If a desired datatype is missing, you can add it under ''Vocabularies'' -> Datatypes."

      - label: Strain(s)
        name: strains
        widget: list
        required: false
        hint: "Free-text list of strain identifiers. One item per line."

      - label: Data Origin(s)
        name: data_origins
        widget: relation
        collection: vocabularies
        file: data_origins
        multiple: true
        required: false
        value_field: data_origins.*
        display_fields: [data_origins.*]
        search_fields: [data_origins.*]
        hint: "If a desired datatype is missing, you can add it under ''Vocabularies'' -> Data Origins."

      - label: Detection Method(s)
        name: detection_methods
        widget: relation
        collection: vocabularies
        file: detection_methods
        multiple: true
        required: false
        value_field: detection_methods.*
        display_fields: [detection_methods.*]
        search_fields: [detection_methods.*]
        hint: "If a desired detection method is missing, you can add it under ''Vocabularies'' -> Data Origins."

      - label: Subtypes
        name: subtypes
        widget: relation
        collection: subtypes
        multiple: true
        required: false
        value_field: key
        display_fields: [name]
        search_fields: [name]

      - label: Sources
        name: sources
        widget: relation
        collection: vocabularies
        file: sources
        multiple: true
        required: false
        value_field: sources.*
        display_fields: [sources.*]
        search_fields: [sources.*]
        hint: "The source where blastocystis was sampled from.<br>If a desired source is missing, you can add it under ''Vocabularies'' -> Sources."

      - label: Countries
        name: countries
        widget: relation
        collection: vocabularies
        file: countries
        multiple: true
        required: false
        value_field: countries.*.name
        display_fields: [countries.*.name]
        search_fields: [countries.*.name, countries.*.iso]
        hint: "All countries from the ISO 3166 coutry code.<br>If a desired datatype is missing, you can add it under ''Lab Protocols''."

      - label: Lab Protocols
        name: lab_protocols
        widget: relation
        collection: lab_protocols
        multiple: true
        required: false
        value_field: key
        display_fields: [title]
        search_fields: [title]
        hint: "If a desired datatype is missing, you can add it under ''Lab Protocols''."

      - label: Annotations
        name: annotations
        widget: list
        required: false
        label_singular: Annotation
        summary: "{{fields.severity}} — {{fields.title}}"
        hint: "Optional contextual notes shown below the hero, before the description. Each can link publications."
        fields:
          - label: Severity
            name: severity
            widget: select
            default: info
            options:
              - { label: "Info", value: info }
              - { label: "Warning", value: warning }
              - { label: "Severe warning", value: severe }
            hint: "Controls the colour and icon of the annotation."
          - label: Title
            name: title
            widget: string
          - label: Text
            name: text
            widget: markdown
            hint: "Basic markdown supported (bold, italics, links, lists)."
          - label: Related Publication(s)
            name: related_publications
            widget: relation
            collection: publications
            file: publications
            value_field: "publications.*.key"
            search_fields:
              [
                "publications.*.key",
                "publications.*.title",
                "publications.*.date",
                "publications.*.publication_name",
                "publications.*.authors",
              ]
            display_fields:
              [
                "publications.*.title",
                "publications.*.date",
                "publications.*.publication_name",
                "publications.*.authors",
              ]
            multiple: true
            required: false
            hint: "Publications must be added before you can link to them here."

      - label: Description
        name: body
        widget: markdown
        required: false
        default: "Add your description here."
        hint: "Add a description of the sutypes.<br>**Be careful, you can break things here!** This field supports the extendet markdown syntax. Please make shure your syntax is correct, otherwise the website might fail. Please **test it offline** if you use the extendet markdown syntax!"

  # -----------------------------------------------------------------------
  # BLOG
  # -----------------------------------------------------------------------
  - name: blog
    icon: article
    label: Blog
    folder: content/data/blog
    create: true
    slug: "{{slug}}"
    preview_path: "data/blog/{{slug}}/"
    fields:
      - name: layout
        label: Layout
        widget: hidden
        default: layouts/blog-post-page.njk

      - label: Title
        name: title
        widget: string
        hint: "The headline of the blog article."

      - label: Publication Date
        name: publication_date
        widget: string
        hint: "Enter a year (2024), month and year (06.2024), or full date (11.06.2024)"
        pattern:
          [
            '^(((0[1-9]|[12]\d|3[01])\.)?(0[1-9]|1[0-2])\.)?\d{4}$',
            "Use dd.mm.yyyy, mm.yyyy, or yyyy",
          ]

      - label: Author
        name: author
        widget: relation
        collection: community
        file: people
        value_field: "people.*.name"
        display_fields: ["people.*.name"]
        search_fields:
          ["people.*.name", "people.*.affiliation", "people.*.role"]
        required: false
        hint: "Optional. Select the author from the People list."

      - label: Related Publication(s)
        name: related_publications
        widget: relation
        collection: publications
        file: publications
        value_field: "publications.*.key"
        search_fields:
          [
            "publications.*.key",
            "publications.*.title",
            "publications.*.date",
            "publications.*.publication_name",
            "publications.*.authors",
          ]
        display_fields:
          [
            "publications.*.title",
            "publications.*.date",
            "publications.*.publication_name",
            "publications.*.authors",
          ]
        multiple: true
        required: false
        hint: "Publications must be added before you can link to them here."

      - label: Related Subtypes
        name: related_subtypes
        widget: relation
        collection: subtypes
        multiple: true
        required: false
        value_field: key
        display_fields: [name]
        search_fields: [name]
        hint: "Subtype pages will list this article under ''Related Blog Articles''."

      - label: Related Datasets
        name: related_datasets
        widget: relation
        collection: datasets
        multiple: true
        required: false
        value_field: key
        display_fields: [title]
        search_fields: [title]
        hint: "Dataset pages will list this article under ''Related Blog Articles''."

      - label: Body
        name: body
        widget: markdown
        default: "Write your article here."
        hint: "The article text in markdown ([see markdown cheat sheet](/documentation/markdown/markdown_cheat_sheet/))."

  # -----------------------------------------------------------------------
  # BIOBANK
  # -----------------------------------------------------------------------
  - name: biobank
    icon: package
    label: Biobank
    folder: content/data/biobank
    create: true
    slug: "{{slug}}"
    preview_path: "data/biobank/{{slug}}/"
    collector:
      template: biobank-card.njk
      search_fields:
        [
          title,
          contact_person_name,
          affiliated_lab,
          country,
          resource_type,
          body,
        ]
    fields:
      - name: layout
        label: Layout
        widget: hidden
        default: layouts/biobank-page.njk

      - label: Key
        name: key
        widget: hidden
        default: "{{uuid}}"

      - label: Title
        name: title
        widget: string
        hint: "The name of the item offered (e.g. a strain, sample, or reagent)."

      - label: Resource Type
        name: resource_type
        widget: select
        options:
          - Strain
          - Sample
          - DNA / Nucleic acid
          - Reagent
          - Culture medium
          - Other
        default: Strain
        hint: "What kind of physical resource this is."

      - label: Contact person name
        name: contact_person_name
        widget: string
        hint: "The person offering this item. May differ from the lab's main contact."

      - label: Contact person email
        name: contact_person_email
        widget: string
        type: email
        hint: "Orders for this item are placed by email to this address."

      - label: Affiliated research lab
        name: affiliated_lab
        widget: relation
        collection: community
        file: research_labs
        multiple: false
        value_field: "research_labs.*.key"
        display_fields: ["research_labs.*.lab_name"]
        search_fields:
          ["research_labs.*.lab_name", "research_labs.*.institution_name"]
        hint: "The lab this item belongs to. The entry's country is taken from this lab."

      - label: Picture
        name: picture
        widget: image
        required: false
        hint: "Optional photo of the item. JPG or WebP."

      - label: Description
        name: body
        widget: markdown
        required: false
        default: "Describe the item, quantities, condition, and any handling notes here."
        hint: "The item description in markdown ([see markdown cheat sheet](/documentation/markdown/markdown_cheat_sheet/))."

  # -----------------------------------------------------------------------
  # PUBLICATIONS
  # -----------------------------------------------------------------------
  - name: publications
    icon: database
    label: Publications
    collector:
      template: publication.njk
      search_fields: [title, authors, publication_name, date]
    files:
      - name: publications
        label: Publications
        file: content/data/publications.json
        fields:
          - label: Publications
            name: publications
            widget: list
            label_singular: Publication
            fields:
              - label: Key
                name: key
                widget: hidden
                default: "{{uuid}}"

              - label: Title
                name: title
                widget: string
              - label: Authors
                name: authors
                widget: list
                label_singular: Author
                hint: "One author per line."
              - label: Publication Date
                name: Date
                widget: string
                hint: "Enter a year (2024), month and year (06.2024), or full date (11.06.2024)"
                pattern:
                  [
                    '^(((0[1-9]|[12]\d|3[01])\.)?(0[1-9]|1[0-2])\.)?\d{4}$',
                    "Use dd.mm.yyyy, mm.yyyy, or yyyy",
                  ]
              - label: Name of Publication
                name: publication_name
                widget: string
                hint: "Name of the journal or conference where the thing was published."

              - label: DOI
                name: doi
                widget: string
                required: false
                hint: "Enter without the prefix of`https://doi.org/` prefix, e.g. `10.1038/s41564-019-0622-3`."

              - label: URL
                name: url
                widget: string
                required: false
                hint: "Only really needed of DOI is not available."

  # -----------------------------------------------------------------------
  # LAB PROTOCOL
  # -----------------------------------------------------------------------
  - name: lab_protocols
    icon: database
    label: Lab Protocols
    folder: content/data/lab_protocols
    create: true
    slug: "{{slug}}"
    preview_path: "data/lab_protocols/{{slug}}/"
    fields:
      - name: layout
        label: Layout
        widget: hidden
        default: layouts/lab-protocol.njk

      - label: Key
        name: key
        widget: hidden
        default: "{{uuid}}"

      - label: Title
        name: title
        widget: string

      - label: Related Publications
        name: related_publications
        widget: relation
        collection: publications
        file: publications
        value_field: "publications.*.key"
        search_fields: ["publications.*.key", "publications.*.title"]
        display_fields: ["publications.*.key", "publications.*.title"]
        multiple: true

      - label: Protocol
        name: body
        widget: markdown
        hint: "Add the Protocol here (in markdown).<br>**Be careful, you can break things here!** This field supports the extendet markdown syntax. Please make shure your syntax is correct, otherwise the website might fail. Please **test it offline** if you use the extendet markdown syntax!"
        default: "Add your description here."

  # -----------------------------------------------------------------------
  # SUBTYPE
  # -----------------------------------------------------------------------
  - name: subtypes
    icon: database
    label: Subtypes
    folder: content/data/subtypes
    create: true
    slug: "{{slug}}"
    preview_path: "data/subtypes/{{slug}}/"
    fields:
      - name: layout
        label: Layout
        widget: hidden
        default: layouts/subtype.njk

      - label: Key
        name: key
        widget: hidden
        default: "{{uuid}}"

      - label: Name
        name: name
        widget: string
        hint: "e.g. Subtype 1, Subtype 2"

      - label: Sources / Hosts
        name: sources
        widget: relation
        collection: vocabularies
        file: sources
        multiple: true
        required: false
        value_field: sources.*
        display_fields: [sources.*]
        search_fields: [sources.*]
        hint: "If a desired source / host is missing, you can add it under ''Vocabularies'' -> Sources."

      - label: Download Link to Reference Genomes
        name: reference_genome_link
        widget: string
        required: false

      - label: Download Link to SSU rRNA Sequence
        name: ssu_rrna_link
        widget: string
        required: false

      - label: Description
        name: body
        widget: markdown
        default: "# Short Description\n\nAdd your description here."
        hint: "Add a description of the dataset.<br>**Be careful, you can break things here!** This field supports the extendet markdown syntax. Please make shure your syntax is correct, otherwise the website might fail. Please **test it offline** if you use the extendet markdown syntax!"

  # -----------------------------------------------------------------------
  # COMMUNITY (Research Labs, People)
  # -----------------------------------------------------------------------
  - name: community
    icon: groups
    label: Community
    files:
      - name: research_labs
        label: Research labs
        file: content/data/research_labs.json
        collector:
          template: research-labs-card.njk
        fields:
          - label: Research labs
            name: research_labs
            widget: list
            label_singular: Research lab
            fields:
              - label: Key
                name: key
                widget: hidden
                default: "{{uuid}}"

              - label: Lab Name
                name: lab_name
                widget: string

              - label: Institution Logo (upload)
                name: institution_logo_upload
                widget: image
                required: false
                hint: "Upload the institution logo. Provide either this OR a logo URL below — at least one is expected. SVG, PNG or WebP on a transparent background works best.<br>Alteratively, provide a link to a logo below.<br>Landscape photo, recommended 1200×600 px (2:1 ratio). JPG or WebP. Will be cropped as a banner at the top of the card."

              - label: Institution Logo (URL)
                name: institution_logo_url
                widget: string
                required: false
                hint: "Link to the institution logo (e.g. from the university website). Used when you have no file to upload. At least one of the two logo fields should be filled in.<br>Landscape photo, recommended 1200×600 px (2:1 ratio). JPG or WebP. Will be cropped as a banner at the top of the card"

              - label: Short description
                name: short_description
                widget: text
                required: false
                hint: "A few sentences"

              - label: Contact name
                name: contact_name
                widget: string

              - label: Contact email
                name: contact_mail
                widget: string
                type: email

              - label: Contact webpage
                name: contact_url
                widget: string
                required: false
                hint: "URL to the contact person's personal or lab webpage."

              - label: Contact image
                name: contact_img_path
                widget: image
                required: false
                hint: "Square portrait photo, minimum 200×200 px. JPG or WebP. Displayed as a small circle next to the contact name."

              - label: Name of Institution
                name: institution_name
                widget: string

              - label: Address of Institution
                name: institution_address
                widget: text

              - label: Country
                name: country
                widget: relation
                collection: vocabularies
                file: countries
                multiple: false
                value_field: countries.*.name
                display_fields: [countries.*.name]
                search_fields: [countries.*.name, countries.*.iso]
                hint: "Used as the country for any Biobank entries affiliated with this lab."

      - name: people
        label: People
        file: content/data/people.json
        collector:
          template: people-card.njk
        fields:
          - label: People
            name: people
            widget: list
            label_singular: Person
            fields:
              - label: Name
                name: name
                widget: string

              - label: Picture
                name: picture
                widget: image
                required: false
                hint: "Square portrait photo, minimum 200×200 px. JPG or WebP."

              - label: Email
                name: mail
                widget: string
                type: email
                required: false

              - label: Affiliation
                name: affiliation
                widget: string
                required: false

              - label: Role
                name: role
                widget: string
                required: false
                hint: 'A single word describing what they do, e.g. "Developer", "Researcher".'

              - label: Website
                name: website
                widget: string
                required: false
                hint: "URL to a personal or lab webpage."

              - label: GitHub
                name: github
                widget: string
                required: false
                hint: "URL to their GitHub profile, e.g. https://github.com/username."

  - divider: true

  # -----------------------------------------------------------------------
  # VOCABULARIES
  # -----------------------------------------------------------------------
  - name: vocabularies
    label: Vocabularies
    icon: database
    files:
      - label: Datatypes
        name: datatypes
        file: content/data/datatypes.yaml
        fields:
          - label: Datatypes
            name: datatypes
            widget: list

      - label: Sources
        name: sources
        file: content/data/sources.yaml
        fields:
          - label: Sources
            name: sources
            widget: list

      - label: Data origins
        name: data_origins
        file: content/data/data_origins.yaml
        fields:
          - label: Data origins
            name: data_origins
            widget: list

      - label: Detection methods
        name: detection_methods
        file: content/data/detection_methods.yaml
        fields:
          - label: Detection methods
            name: detection_methods
            widget: list

      - label: Countries
        name: countries
        file: content/data/countries.yaml
        fields:
          - label: Countries
            name: countries
            widget: list
            fields:
              - { label: ISO code, name: iso, widget: string }
              - { label: Name, name: name, widget: string }

  - { divider: true, label: "Website" }
  # -----------------------------------------------------------------------
  # ANNOUNCEMENTS
  # -----------------------------------------------------------------------
  - name: announcements
    icon: campaign
    label: Announcements
    collector:
      template: announcement
      search_fields: [title, body]
    files:
      - name: announcements
        label: Announcements
        file: content/data/announcements.yaml
        fields:
          - label: Announcements
            name: announcements
            widget: list
            label_singular: Announcement
            fields:
              - label: Title
                name: title
                widget: string

              - label: Publication Date
                name: publication_date
                widget: string
                hint: "Date the announcement becomes visible. Format: dd.mm.yyyy"
                pattern:
                  [
                    '^(0[1-9]|[12]\d|3[01])\.(0[1-9]|1[0-2])\.\d{4}$',
                    "Use dd.mm.yyyy",
                  ]

              - label: Valid Until
                name: valid_until
                widget: string
                hint: "Date after which the announcement is hidden from the homepage. Format: dd.mm.yyyy"
                pattern:
                  [
                    '^(0[1-9]|[12]\d|3[01])\.(0[1-9]|1[0-2])\.\d{4}$',
                    "Use dd.mm.yyyy",
                  ]

              - label: Body
                name: body
                widget: markdown

  - { divider: true, label: "Website" }
  # ─── Pages ───────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: content
    create: true
    extension: md
    format: frontmatter
    icon: select_window
    preview_path: "{{slug}}/"
    fields:
      - { label: "Title", name: "title", widget: "string" }

      - name: layout
        label: Layout
        widget: hidden
        default: layouts/default-page.njk

      - label: Description
        name: description
        widget: text
        required: false
        hint: "Short desctiption for search engines. Will be displayed unter the title in the google search."

      - label: Body
        name: body
        widget: markdown
        hint: "Content of the Website, written in markdown, and supporting custom components. <br>**Be careful, you can break things here!** This field supports the extendet markdown syntax. Please make shure your syntax is correct, otherwise the website might fail. Please **test it offline** if you use the extendet markdown syntax!"

  # ─── Header and Footer ───────────────────────────────────────────────────────────────────
  - name: navigation
    label: Navigation
    icon: select_window
    files:
      - label: Header Configuration
        name: header
        file: content/data/header.json
        fields:
          - label: "Header Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - {
                  label: "File",
                  name: "file",
                  widget: "string",
                  required: false,
                }
              - label: "Items"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "File", name: "file", widget: "string" }

      - label: Footer Configuration
        name: footer
        file: content/data/footer.json
        fields:
          - {
              label: "Description",
              name: "description",
              widget: "string",
              hint: "Short description displayed next to the logo",
            }
          - {
              label: "Funding",
              name: "funding",
              widget: "string",
              hint: "Funding acknowledgment text",
            }
          - label: "Footer Columns"
            name: "columns"
            widget: "list"
            hint: "Configure footer column sections"
            fields:
              - { label: "Column Title", name: "title", widget: "string" }
              - label: "Links"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }

      - label: Title and Logo
        name: branding
        file: content/data/branding.json
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - label: "Logo"
            name: "site_logo"
            widget: image
            required: true
            hint: "Upload the site logo. SVG, PNG or WebP on a transparent background recommended."
          - label: "Icon for Browser Tab"
            name: "favicon"
            widget: image
            required: false
            hint: "Upload the image that will be displayed as a logo to the left of the title in the browser. SVG, PNG or WebP on a transparent background recommended. Ideally, the image is square."
