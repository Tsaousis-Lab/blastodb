publish_mode: editorial_workflow

backend:
  name: github
  repo: Tsaousis-Lab/blastodb
  branch: main # CMS always writes to main
  squash_merges: true

media_folder: assets/uploads
public_folder: /assets/uploads
pages_folder: content

collections:
  # -----------------------------------------------------------------------
  # DATASET
  # Central collection. Links to most other collections.
  # -----------------------------------------------------------------------
  - name: datasets
    label: Datasets
    folder: content/datasets
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Description
        name: description
        widget: text
        required: false

      - label: Link to source
        name: link_to_source
        widget: string
        hint: "URL or DOI pointing to the raw data"

      - label: Strains
        name: strains
        widget: list
        required: false
        hint: "Free-text list of strain identifiers"

      - label: Datatypes
        name: datatypes
        widget: relation
        collection: datatype_data
        file: datatypes
        multiple: true
        min: 1
        value_field: datatypes.*
        display_fields: [datatypes.*]
        search_fields: [datatypes.*]
        hint: "At least one required"

      - label: Data origins
        name: data_origins
        widget: relation
        collection: data_origins
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [name]

      - label: Data sources
        name: data_sources
        widget: relation
        collection: data_sources
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [name]

      - label: Detection methods
        name: detection_methods
        widget: relation
        collection: detection_methods
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [name]

      - label: Subtypes
        name: subtypes
        widget: relation
        collection: subtypes
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [name]

      - label: Hosts
        name: hosts
        widget: relation
        collection: hosts
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [name]

      - label: Publications
        name: publications
        widget: relation
        collection: publications
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [title, ref_id]

      - label: Lab protocols
        name: lab_protocols
        widget: relation
        collection: lab_protocols
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [title]

      - label: Countries
        name: countries
        widget: relation
        collection: country_data
        file: countries
        multiple: true
        required: false
        value_field: countries.*.iso
        display_fields: [countries.*.name]
        search_fields: [countries.*.name, countries.*.iso]

  # -----------------------------------------------------------------------
  # PUBLICATION
  # -----------------------------------------------------------------------
  - name: publications
    label: Publications
    folder: content/publications
    create: true
    slug: "{{ref_id}}"
    fields:
      - label: Reference ID
        name: ref_id
        widget: string
        hint: "Format: LastnameYear, e.g. Smith2023"

      - label: Title
        name: title
        widget: string

      - label: Authors
        name: authors
        widget: list
        label_singular: Author
        hint: "One author per entry"

      - label: Date
        name: date
        widget: string
        hint: "DD.MM.YYYY, MM.YYYY, or YYYY"

      - label: Journal name
        name: journal_name
        widget: string

      - label: DOI
        name: doi
        widget: string
        required: false

      - label: URL
        name: url
        widget: string
        required: false

  # -----------------------------------------------------------------------
  # LAB PROTOCOL
  # -----------------------------------------------------------------------
  - name: lab_protocols
    label: Lab protocols
    folder: content/lab_protocols
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Protocol
        name: protocol
        widget: markdown
        hint: "Full long-form protocol text"

      - label: Related publications
        name: related_publications
        widget: relation
        collection: publications
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [title, ref_id]

  # -----------------------------------------------------------------------
  # SUBTYPE
  # -----------------------------------------------------------------------
  - name: subtypes
    label: Subtypes
    folder: content/data/subtypes
    create: true
    slug: "{{slug}}"
    fields:
      - label: ID
        name: id
        widget: string
        hint: "e.g. ST1, ST2"

      - label: Name
        name: name
        widget: string
        hint: "e.g. Subtype 1, Subtype 2"

      - label: Short description
        name: short_description
        widget: string
        required: false

      - { label: "Body", name: "body", widget: "markdown" }

  # -----------------------------------------------------------------------
  # RESEARCH LAB
  # -----------------------------------------------------------------------
  - name: research_labs
    label: Research labs
    folder: content/research_labs
    create: true
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string

      - label: Short description
        name: short_description
        widget: text
        required: false
        hint: "A few sentences"

      - label: Contact name
        name: contact_name
        widget: string

      - label: Contact email
        name: contact_mail
        widget: string

      - label: Contact image
        name: contact_img_path
        widget: image
        required: false

      - label: Address
        name: address
        widget: text

      - label: Lab image
        name: img_path
        widget: image

  # -----------------------------------------------------------------------
  # COUNTRYS
  # Single YAML file containing all continents from the ISO3166 standart
  # of country codes.
  # -----------------------------------------------------------------------
  - name: country_data
    label: Countries
    files:
      - label: Countries
        name: countries
        file: content/data/countries.yaml
        fields:
          - label: Countries
            name: countries
            widget: list
            hint: "All countries from the ISO 3166 standart of country codes.<br>Please only change if this standart changes!"
            fields:
              - { label: ISO code, name: iso, widget: string }
              - { label: Name, name: name, widget: string }

  # -----------------------------------------------------------------------
  # LOOKUP TABLES
  # Simple name-only collections used as controlled vocabularies.
  # -----------------------------------------------------------------------
  - name: datatype_data
    label: Datatypes
    files:
      - label: Datatypes
        name: datatypes
        file: content/data/datatypes.yaml
        fields:
          - label: Datatypes
            name: datatypes
            widget: list
            hint: "One datatype per line"

  - name: data_sources
    label: Data sources
    folder: content/data_sources
    create: true
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string
        hint: "e.g. Human, Mammal, Bird"

  - name: data_origins
    label: Data origins
    folder: content/data_origins
    create: true
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string
        hint: "e.g. in-vivo, ex-vivo, in-vitro"

  - name: detection_methods
    label: Detection methods
    folder: content/detection_methods
    create: true
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string
        hint: "e.g. Microscopy, PCR, Culturing"

  - name: hosts
    label: Hosts
    folder: content/hosts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string
        hint: "e.g. Homo sapiens, Rattus norvegicus"

  # ─── Pages ───────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: content
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }

      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
        }

      - { label: "Body", name: "body", widget: "markdown" }

  # ─── Navigation Bar ───────────────────────────────────────────────────────────
  - name: "nav"
    label: "Navigation"
    files:
      - label: "Navigation Configuration"
        name: "nav"
        file: "nav.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Site Logo", name: "site_logo", widget: "string" }
          - label: "Navigation Items"
            name: "nav"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - {
                  label: "File",
                  name: "file",
                  widget: "string",
                  required: false,
                }
              - label: "Items"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "File", name: "file", widget: "string" }
