publish_mode: editorial_workflow

backend:
  name: github
  repo: Tsaousis-Lab/blastodb
  branch: main # CMS always writes to main
  squash_merges: true

media_folder: assets/uploads
public_folder: /assets/uploads
pages_folder: content

collections:
  - { divider: true, label: "Database" }
  # -----------------------------------------------------------------------
  # DATASETS
  # -----------------------------------------------------------------------
  - name: datasets
    icon: database
    label: Datasets
    folder: content/data/datasets
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Description
        name: description
        widget: text
        required: false

      - label: Link to source
        name: link_to_source
        widget: string
        hint: "URL or DOI pointing to the raw data"

      - label: Strains
        name: strains
        widget: list
        required: false
        hint: "Free-text list of strain identifiers"

      - label: Datatypes
        name: datatypes
        widget: relation
        collection: vocabularies
        file: datatypes
        multiple: true
        min: 1
        value_field: datatypes.*
        display_fields: [datatypes.*]
        search_fields: [datatypes.*]
        hint: "At least one required"

      - label: Data origins
        name: data_origins
        widget: relation
        collection: vocabularies
        file: data_origins
        multiple: true
        required: false
        value_field: data_origins.*
        display_fields: [data_origins.*]
        search_fields: [data_origins.*]

      - label: Data sources
        name: data_sources
        widget: relation
        collection: vocabularies
        file: data_sources
        multiple: true
        required: false
        value_field: data_sources.*
        display_fields: [data_sources.*]
        search_fields: [data_sources.*]

      - label: Detection methods
        name: detection_methods
        widget: relation
        collection: vocabularies
        file: detection_methods
        multiple: true
        required: false
        value_field: detection_methods.*
        display_fields: [detection_methods.*]
        search_fields: [detection_methods.*]

      - label: Subtypes
        name: subtypes
        widget: relation
        collection: subtypes
        multiple: true
        required: false
        value_field: name
        display_fields: [name]
        search_fields: [name, id]

      - label: Sources
        name: sources
        widget: relation
        collection: vocabularies
        file: sources
        multiple: true
        required: false
        value_field: sources.*
        display_fields: [sources.*]
        search_fields: [sources.*]

      - label: Publications
        name: publications
        widget: relation
        collection: publications
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [title, ref_id]

      - label: Lab protocols
        name: lab_protocols
        widget: relation
        collection: lab_protocols
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [title]

      - label: Countries
        name: countries
        widget: relation
        collection: vocabularies
        file: countries
        multiple: true
        required: false
        value_field: countries.*.name
        display_fields: [countries.*.name]
        search_fields: [countries.*.name, countries.*.iso]

  # -----------------------------------------------------------------------
  # PUBLICATION
  # -----------------------------------------------------------------------
  - name: publications
    icon: database
    label: Publications
    folder: content/data/publications
    create: true
    slug: "{{citation_key}}"
    fields:
      - label: Citation Key
        name: citation_key
        widget: string
        hint: "Format: LastnameYear, e.g. Smith2023"

      - label: Title
        name: title
        widget: string

      - label: Authors
        name: authors
        widget: list
        label_singular: Author
        hint: "One author per entry"

      - label: Date
        name: date
        widget: datetime
        type: date
        required: false

      - label: Name of Publication
        name: publication_name
        widget: string

      - label: DOI
        name: doi
        widget: string
        required: false

      - label: URL
        name: url
        widget: string
        required: false

  # -----------------------------------------------------------------------
  # LAB PROTOCOL
  # -----------------------------------------------------------------------
  - name: lab_protocols
    icon: database
    label: Lab protocols
    folder: content/data/lab_protocols
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Related publications
        name: related_publications
        widget: relation
        collection: publications
        multiple: true
        required: false
        value_field: "{{slug}}"
        search_fields: [title, ref_id]

      - label: Protocol
        name: body
        widget: markdown
        hint: "Add the Protocol here."
        default: "todo"

  # -----------------------------------------------------------------------
  # SUBTYPE
  # -----------------------------------------------------------------------
  - name: subtypes
    icon: database
    label: Subtypes
    folder: content/data/subtypes
    create: true
    slug: "{{slug}}"
    fields:
      - {
          name: layout,
          label: Layout,
          widget: hidden,
          default: layouts/subtype.njk,
        }

      - label: ID
        name: id
        widget: string
        hint: "e.g. ST1, ST2"

      - label: Name
        name: name
        widget: string
        hint: "e.g. Subtype 1, Subtype 2"

      - label: Sources
        name: sources
        widget: relation
        collection: vocabularies
        file: sources
        multiple: true
        required: false
        value_field: sources.*
        display_fields: [sources.*]
        search_fields: [sources.*]

      - label: Download Link to Reference Genomes
        name: reference_genome_link
        widget: string
        required: false

      - label: Download Link to SSU rRNA Sequence
        name: ssu_rrna_link
        widget: string
        required: false

      - label: Description
        name: body
        widget: markdown
        default: "## Short Description\n\nAdd your description here.\n\nPlease do not change the code below this line.\n\n---\n\n## Explore Datasets Containing {{ name }}\n\n[collector -> datasets; search:[title]; sort:[date,title]; filters:[Countries->[countries]]; arrange:rows; card-template:dataset.njk; pre-filter:[subtype={{ name }}]]"

  # -----------------------------------------------------------------------
  # RESEARCH LAB
  # -----------------------------------------------------------------------
  - name: research_labs
    icon: database
    label: Research labs
    folder: content/data/research_labs
    create: true
    slug: "{{slug}}"
    fields:
      - label: Name
        name: name
        widget: string

      - label: Short description
        name: short_description
        widget: text
        required: false
        hint: "A few sentences"

      - label: Contact name
        name: contact_name
        widget: string

      - label: Contact email
        name: contact_mail
        widget: string

      - label: Contact image
        name: contact_img_path
        widget: image
        required: false

      - label: Address
        name: address
        widget: text

      - label: Lab image
        name: img_path
        widget: image

  - { divider: true, label: "Vocabularies" }

  # -----------------------------------------------------------------------
  # VOCABULARIES
  # -----------------------------------------------------------------------
  - name: vocabularies
    label: Vocabularies
    icon: database
    files:
      - label: Datatypes
        name: datatypes
        file: content/data/datatypes.yaml
        fields:
          - label: Datatypes
            name: datatypes
            widget: list

      - label: Sources
        name: sources
        file: content/data/sources.yaml
        fields:
          - label: Sources
            name: sources
            widget: list

      - label: Data origins
        name: data_origins
        file: content/data/data_origins.yaml
        fields:
          - label: Data origins
            name: data_origins
            widget: list

      - label: Data sources
        name: data_sources
        file: content/data/data_sources.yaml
        fields:
          - label: Data sources
            name: data_sources
            widget: list

      - label: Detection methods
        name: detection_methods
        file: content/data/detection_methods.yaml
        fields:
          - label: Detection methods
            name: detection_methods
            widget: list

      - label: Countries
        name: countries
        file: content/data/countries.yaml
        fields:
          - label: Countries
            name: countries
            widget: list
            fields:
              - { label: ISO code, name: iso, widget: string }
              - { label: Name, name: name, widget: string }

  - { divider: true, label: "Website" }
  # ─── Pages ───────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: content
    create: true
    extension: md
    format: frontmatter
    icon: select_window
    fields:
      - { label: "Title", name: "title", widget: "string" }

      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
        }

      - { label: "Body", name: "body", widget: "markdown" }

  # ─── Header and Footer ───────────────────────────────────────────────────────────────────
  - name: navigation
    label: Navigation
    icon: select_window
    files:
      - label: Header Configuration
        name: header
        file: content/data/header.json
        fields:
          - label: "Header Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - {
                  label: "File",
                  name: "file",
                  widget: "string",
                  required: false,
                }
              - label: "Items"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "File", name: "file", widget: "string" }

      - label: Footer Configuration
        name: footer
        file: content/data/footer.json
        fields:
          - {
              label: "Description",
              name: "description",
              widget: "string",
              hint: "Short description displayed next to the logo",
            }
          - {
              label: "Funding",
              name: "funding",
              widget: "string",
              hint: "Funding acknowledgment text",
            }
          - label: "Footer Columns"
            name: "columns"
            widget: "list"
            hint: "Configure footer column sections"
            fields:
              - { label: "Column Title", name: "title", widget: "string" }
              - label: "Links"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }

      - label: Title and Logo
        name: branding
        file: content/data/branding.json
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - {
              label: "Logo",
              name: "site_logo",
              widget: "string",
              hint: "URL or path to the logo image",
            }
