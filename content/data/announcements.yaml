    body: BlastoDB workshop is being held on 18th June 2026 in Ingram.
  - title: Abstract Deadline Extension for the 5th International Blastocystis Conference
    publication_date: 02.06.2026
    valid_until: 30.06.2026
    body: |-
      The deadline for abstract submission for the 5th International Blastocystis Conference has been extended until **30th June 2026**. Please note that the application for COST funding remains closed.

      🔗 [Abstract Submission | 5th International Blastocystis Conference](https://docs.google.com/forms/d/e/1FAIpQLSeRJTbR5Sm9zZwjjJSispU1lE-Wz0i8j7zO3tBXf6q2HxSN5w/viewform?pli=1)   

      Please note that submitting an abstract is not required to attend the conference.

      We look forward to receiving your submissions and welcoming you to the 5th International Blastocystis Conference in La Laguna, Canary Islands, Spain.
  - title: Announcing the 5th International Blastocystis Conference
    publication_date: 13.02.2026
    valid_until: 02.09.2026
    body: |-
      We are delighted to announce the fifth and final conference of the Blastocystis under One Health COST Action (CA21105). The conference will take place from the 2nd to 4th of September 2026 in Tenerife.

      🔬 Conference sessions will cover:

      - Diagnosis and molecular characterisation
      - Epidemiology
      - Intestinal ecology (gut microbiome)
      - Clinical significance and associations with gastrointestinal diseases
      - Evolutionary biology and advances in ‘omics

      Abstract Deadline is the **~~31.05.2026~~ 30.06.2026**: 🔗 [Abstract Submission | 5th International Blastocystis Conference](https://docs.google.com/forms/d/e/1FAIpQLSeRJTbR5Sm9zZwjjJSispU1lE-Wz0i8j7zO3tBXf6q2HxSN5w/viewform?pli=1)   

      We look forward to receiving your submissions and welcoming the Blastocystis research community to Tenerife in September 2026!
