# .github/workflows/publish.yml
#
# Daily content pipeline, steps 1–3, then hands off to sync-staging.yml for step 4:
#   1. Build staging        — if it fails, STOP (nothing publishes; live site safe).
#   2. Publish staging→main — only if staging has content main doesn't.
#   3. Build & deploy main  — reuses your existing deploy.yml (dispatched).
#   4. Sync main→staging     — handed off to the separate sync-staging.yml workflow.
#
# Run on demand any time: Actions tab → "Publish content" → Run workflow.

name: Publish content (staging → main)

on:
  schedule:
    # UTC. 05:30 UTC ≈ 06:30 UK summer / 05:30 UK winter. :30 dodges the busy hour.
    - cron: "30 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write # merge into main
  pull-requests: write # open + merge the publish PR
  actions: write # dispatch deploy.yml and sync-staging.yml

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging (full history)
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Is there anything to publish?
        id: state
        run: |
          git fetch origin main
          # Content = commits on staging that main doesn't have (NOT a tree diff,
          # which would false-positive once dev features are merged into main).
          if [ "$(git rev-list --count origin/main..origin/staging)" -gt 0 ]; then
            echo "has_content=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_content=false" >> "$GITHUB_OUTPUT"
          fi

      # ───────── 1 · Build staging (gate) ─────────
      - name: Set up Node
        if: steps.state.outputs.has_content == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        if: steps.state.outputs.has_content == 'true'
        run: npm install
      - name: 1 · Build staging (FAILS on broken markdown → nothing publishes)
        if: steps.state.outputs.has_content == 'true'
        run: PATH_PREFIX=/blastodb npm run build

      # ───────── 2 · Publish staging → main ─────────
      - name: 2 · Publish staging → main
        if: steps.state.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(date -u +'%Y-%m-%d')"
          PR="$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')"
          if [ -z "$PR" ]; then
            gh pr create --base main --head staging \
              --title "Daily content publish — $DATE" \
              --body "Automated publish of CMS content from staging into main. The site build passed before merging. To undo this day's content, open this PR and click **Revert**."
            PR="$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')"
          fi
          gh pr merge "$PR" --merge

      # ───────── 3 · Build & deploy main (your existing deploy.yml) ─────────
      - name: 3 · Build & deploy main
        if: steps.state.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main

      # ───────── 4 · Hand off to the sync workflow ─────────
      - name: 4 · Sync main → staging
        if: steps.state.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run sync-staging.yml --ref main
